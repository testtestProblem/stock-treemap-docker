services:

  backend:
    build:
      context: ./backend
    restart: always
    environment:
      - TZ=Asia/Taipei
    env_file:
      - .env
    volumes:
      - ./backend/data:/app/data
      - ./stock_index:/stock_index   # 💡 新增這行：把股票清單掛載到容器的 /stock_index
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ./frontend
    restart: always
    ports:
      - "8080:80"  # 💡 修改這裡：將原本的 "80:80" 改為 "8080:80"，避開 Port 80 佔用
    depends_on:
      backend:
        condition: service_healthy
